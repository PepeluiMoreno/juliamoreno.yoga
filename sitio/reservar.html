<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reserva tu clase · Julia Moreno · Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mar: #1d5975; --tinta: #153f54; --crema: #fcfbf8;
    --linea: #e5e0d8; --lleno: #b9b2a6; --ok: #2f8f5b;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--crema); color: var(--tinta);
    font-family: 'Mulish', sans-serif; padding: 2rem 1rem 4rem;
  }
  .marco { max-width: 760px; margin: 0 auto; }
  h1 {
    font-family: 'Marcellus', serif; font-weight: 400;
    color: var(--mar); font-size: 1.9rem; margin-bottom: .25rem;
  }
  .lema { opacity: .7; margin-bottom: 2rem; }
  h2 {
    font-family: 'Marcellus', serif; font-weight: 400;
    font-size: 1.3rem; border-bottom: 1px solid var(--linea);
    padding-bottom: .4rem; margin: 2rem 0 1rem;
  }
  .dia { display: flex; gap: 1rem; padding: .5rem 0;
         border-bottom: 1px solid var(--linea); align-items: baseline; }
  .fecha { flex: 0 0 11rem; font-weight: 600; }
  .franjas { display: flex; flex-wrap: wrap; gap: .5rem; }
  .franja {
    border: 1px solid var(--mar); color: var(--mar);
    background: none; cursor: pointer; font: inherit;
    border-radius: 999px; padding: .3rem .85rem; font-size: .92rem;
  }
  .franja:hover { background: var(--mar); color: #fff; }
  .franja.llena {
    border-color: var(--lleno); color: var(--lleno);
    text-decoration: line-through; cursor: not-allowed;
  }
  .franja.llena:hover { background: none; }
  .plazas { opacity: .75; font-size: .85em; }
  .vacio { opacity: .6; font-style: italic; }
  /* Filtro por clase: solo en la vista general, cuando hay varias. */
  .filtros { display: flex; flex-wrap: wrap; gap: .45rem; margin-bottom: 1.6rem; }
  .filtro {
    border: 1px solid var(--linea); background: #fff; color: var(--tinta);
    border-radius: 999px; padding: .3rem .9rem; font: inherit;
    font-size: .9rem; cursor: pointer;
  }
  .filtro:hover { border-color: var(--mar); }
  .filtro.activo { background: var(--mar); border-color: var(--mar); color: #fff; }
  .clase-nom { font-weight: 600; }
  /* Cabecera de la actividad: qué está reservando el alumno. */
  .ficha {
    background: #fff; border: 1px solid var(--linea); border-radius: 12px;
    overflow: hidden; margin-bottom: 2rem;
  }
  .ficha img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
  .ficha-cuerpo { padding: 1.1rem 1.3rem 1.3rem; }
  .ficha h2 {
    font-family: 'Marcellus', serif; font-weight: 400; color: var(--mar);
    font-size: 1.45rem; border: none; padding: 0; margin: 0 0 .5rem;
  }
  .ficha p { margin: 0 0 .6rem; }
  .ficha-meta { display: flex; flex-wrap: wrap; gap: .4rem .9rem;
                font-size: .88rem; opacity: .8; }
  .ficha-precio { font-weight: 700; color: var(--mar); margin-top: .5rem; }
  .volver { display: inline-block; margin-bottom: 1.2rem; font-size: .88rem;
            color: var(--mar); opacity: .8; }
  .capa {
    position: fixed; inset: 0; background: rgba(21,63,84,.45);
    display: none; align-items: center; justify-content: center; padding: 1rem;
  }
  .capa.abierta { display: flex; }
  .tarjeta {
    background: var(--crema); border-radius: 12px; padding: 1.6rem;
    max-width: 400px; width: 100%; box-shadow: 0 12px 40px rgba(21,63,84,.25);
  }
  .tarjeta h3 {
    font-family: 'Marcellus', serif; font-weight: 400;
    color: var(--mar); font-size: 1.25rem; margin-bottom: 1rem;
  }
  label { display: block; font-size: .85rem; margin: .8rem 0 .25rem; }
  input {
    width: 100%; padding: .55rem .7rem; font: inherit;
    border: 1px solid var(--linea); border-radius: 8px; background: #fff;
  }
  .acciones { display: flex; gap: .6rem; margin-top: 1.4rem; }
  button.principal {
    flex: 1; background: var(--mar); color: #fff; border: none;
    padding: .6rem; border-radius: 8px; font: inherit; cursor: pointer;
  }
  button.secundario {
    background: none; border: 1px solid var(--linea); color: var(--tinta);
    padding: .6rem 1rem; border-radius: 8px; font: inherit; cursor: pointer;
  }
  .aviso { margin-top: 1rem; padding: .6rem .8rem; border-radius: 8px;
           font-size: .9rem; display: none; }
  .aviso.error { display: block; background: #fbeceb; color: #a3352c; }
  .aviso.exito { display: block; background: #e9f5ee; color: var(--ok); }
  .opcional { opacity: .6; font-weight: 400; }
  .dudas { margin-top: 2rem; font-size: .9rem; }
  .dudas a { color: var(--mar); opacity: .8; text-decoration: underline; }
  .dudas a:hover { opacity: 1; }
  footer { margin-top: 1.4rem; font-size: .8rem; opacity: .55; }
</style>
</head>
<body>
<div class="marco">
  <h1>Julia Moreno · Yoga</h1>
  <p class="lema">Reserva tu plaza — elige un hueco disponible.</p>
  <div id="contenido"><p class="vacio">Cargando disponibilidad…</p></div>
  <p class="dudas"><a href="/#contacto">¿Te encaja? Pregúntanos</a></p>
  <footer>Las plazas se muestran de forma anónima. Recibirás confirmación
  por correo.</footer>
</div>

<div class="capa" id="capa">
  <div class="tarjeta">
    <h3 id="tituloReserva">Reservar</h3>
    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" maxlength="80" autocomplete="name">
    <label for="email">Correo electrónico</label>
    <input id="email" type="email" maxlength="120" autocomplete="email">
    <label for="telefono">Teléfono <span class="opcional">(opcional)</span></label>
    <input id="telefono" type="tel" maxlength="30" autocomplete="tel">
    <div class="aviso" id="aviso"></div>
    <div class="acciones">
      <button class="secundario" id="cancelar">Cancelar</button>
      <button class="principal" id="confirmar">Confirmar reserva</button>
    </div>
  </div>
</div>

<script>
// El backend vive en api.juliamoreno.yoga (rutas públicas: no empiezan por
// /admin, así que no pasan por Authelia). La API key vive en el backend, no
// aquí. El CORS del backend permite el origen juliamoreno.yoga.
const API = "https://api.juliamoreno.yoga";
const DIAS = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio",
  "agosto","septiembre","octubre","noviembre","diciembre"];

let seleccion = null; // {event_type_id, inicio, etiqueta}

// Si se llega desde una actividad concreta ("Reservar" en su ficha), la
// URL trae ?clase=<event_type_id> y solo se muestra esa clase.
const CLASE = new URLSearchParams(location.search).get("clase");

function horaLocal(iso) {
  return new Date(iso).toLocaleTimeString("es-ES",
    { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Madrid" });
}
function fechaLarga(iso) {
  const d = new Date(iso);
  return `${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
}

async function cargar() {
  const cont = document.getElementById("contenido");
  try {
    const url = `${API}/disponibilidad?dias=21` + (CLASE ? `&clase=${encodeURIComponent(CLASE)}` : "");
    const r = await fetch(url);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || "error");
    if (!data.clases.length) {
      cont.innerHTML = '<p class="vacio">No hay clases disponibles ahora mismo.</p>';
      return;
    }
    if (CLASE) {
      document.querySelector(".lema").textContent =
        "Elige el día y la hora que mejor te venga.";
    }
    CLASES = data.clases;
    cont.innerHTML = (CLASE ? renderFicha(data.clases[0]) : "")
      + filtros(data.clases)
      + (CLASE ? '<h2>Elige tu día y hora</h2>' : "")
      + `<div id="agenda">${renderAgenda(data.clases)}</div>`;
    engancha();
  } catch (e) {
    cont.innerHTML = '<p class="vacio">No se pudo cargar la disponibilidad. ' +
      'Inténtalo más tarde o <a href="/reservar.html">mira todas las clases</a>.</p>';
  }
}

function renderFicha(c) {
  const a = c.actividad;
  // Si la actividad no está en NocoDB (o falló la lectura), al menos el
  // título y la duración que sí da Cal.diy.
  const titulo = escapar((a && a.titulo) || c.titulo || "Clase");
  const partes = [];
  if (a && a.duracion) partes.push(`&#9201; ${escapar(a.duracion)}`);
  if (a && a.lugar) partes.push(`&#128205; ${escapar(a.lugar)}`);
  // En blanco = no se muestra (sin valor por defecto).
  if (a && a.nivel) partes.push(`&#9679; ${escapar(a.nivel)}`);
  const meta = partes.length
    ? `<p class="ficha-meta">${partes.map(x => `<span>${x}</span>`).join("")}</p>` : "";
  const texto = a && a.texto ? `<p>${escapar(a.texto)}</p>` : "";
  const precio = a && a.precio ? `<p class="ficha-precio">${escapar(a.precio)}</p>` : "";
  const foto = a && a.foto
    ? `<img src="${escapar(a.foto)}" alt="${titulo}">` : "";
  return `<a class="volver" href="/#actividades">&#8592; Todas las actividades</a>
    <section class="ficha">${foto}
      <div class="ficha-cuerpo"><h2>${titulo}</h2>${texto}${meta}${precio}</div>
    </section>`;
}

// Vista por DÍA, mezclando clases: el alumno no piensa "quiero Yin Yoga",
// piensa "¿qué hay el lunes por la mañana?". Listar clase por clase, una
// debajo de otra, obliga a recorrer la página entera para responderse eso.
function renderAgenda(clases) {
  const porDia = {};
  clases.forEach(c => (c.huecos || []).forEach(h => {
    const dia = h.inicio.slice(0, 10);
    (porDia[dia] = porDia[dia] || []).push({ h: h, c: c });
  }));
  const dias = Object.keys(porDia).sort();
  if (!dias.length) return '<p class="vacio">Sin huecos en este periodo.</p>';
  return dias.map(dia => {
    const chips = porDia[dia]
      .sort((a, b) => a.h.inicio.localeCompare(b.h.inicio))
      .map(x => chip(x.c, x.h, !CLASE)).join("");
    return `<div class="dia"><span class="fecha">${fechaLarga(dia)}</span>` +
           `<span class="franjas">${chips}</span></div>`;
  }).join("");
}

function chip(c, h, conNombre) {
  const hora = horaLocal(h.inicio);
  // En la vista general el nombre de la clase va en la propia franja: sin
  // él, un "10:00" suelto no dice a qué te estás apuntando.
  const nombre = conNombre
    ? ` <span class="clase-nom">${escapar(c.titulo)}</span>` : "";
  if (h.libres === null) return `<span class="franja llena">${hora}${nombre}</span>`;
  if (h.libres <= 0)
    return `<span class="franja llena">${hora}${nombre} <span class="plazas">completo</span></span>`;
  return `<button class="franja" data-eid="${c.event_type_id}" ` +
    `data-inicio="${h.inicio}" data-etq="${escapar(c.titulo)} · ${fechaLarga(h.inicio)} ${hora}">` +
    `${hora}${nombre} <span class="plazas">${h.libres} de ${h.total}</span></button>`;
}

function filtros(clases) {
  if (CLASE || clases.length < 2) return "";
  const uno = c => `<button class="filtro" data-eid="${c.event_type_id}">`
                 + `${escapar(c.titulo)}</button>`;
  return `<div class="filtros">
    <button class="filtro activo" data-eid="">Todas</button>
    ${clases.map(uno).join("")}
  </div>`;
}

function abrir(ds) {
  seleccion = { event_type_id: Number(ds.eid), inicio: ds.inicio };
  document.getElementById("tituloReserva").textContent = ds.etq;
  document.getElementById("aviso").className = "aviso";
  document.getElementById("capa").classList.add("abierta");
}
function cerrar() {
  document.getElementById("capa").classList.remove("abierta");
  seleccion = null;
}

async function confirmar() {
  const nombre = document.getElementById("nombre").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const aviso = document.getElementById("aviso");
  const boton = document.getElementById("confirmar");
  if (!nombre || !email) {
    aviso.className = "aviso error"; aviso.textContent = "Rellena nombre y correo.";
    return;
  }
  boton.disabled = true; boton.textContent = "Reservando…";
  try {
    const r = await fetch(`${API}/reservar`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...seleccion, nombre, email, telefono }),
    });
    const data = await r.json();
    if (data.ok) {
      aviso.className = "aviso exito";
      aviso.textContent = "¡Reserva confirmada! Recibirás un correo.";
      setTimeout(() => { cerrar(); cargar(); }, 1600);
    } else {
      aviso.className = "aviso error";
      aviso.textContent = data.error === "clase completa"
        ? "Esa clase se ha completado." : "No se pudo reservar. Inténtalo de nuevo.";
    }
  } catch (e) {
    aviso.className = "aviso error"; aviso.textContent = "Error de conexión.";
  } finally {
    boton.disabled = false; boton.textContent = "Confirmar reserva";
  }
}

let CLASES = [];

function engancha() {
  const cont = document.getElementById("contenido");
  cont.querySelectorAll(".franja:not(.llena)").forEach(b =>
    b.addEventListener("click", () => abrir(b.dataset)));
  cont.querySelectorAll(".filtro").forEach(b =>
    b.addEventListener("click", () => {
      cont.querySelectorAll(".filtro").forEach(x => x.classList.remove("activo"));
      b.classList.add("activo");
      const eid = b.dataset.eid;
      const sel = eid ? CLASES.filter(c => String(c.event_type_id) === eid)
                      : CLASES;
      document.getElementById("agenda").innerHTML = renderAgenda(sel);
      // Los botones repintados necesitan volver a escuchar.
      engancha();
    }));
}

function escapar(s) {
  return String(s || "").replace(/[&<>"']/g,
    c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

document.getElementById("cancelar").addEventListener("click", cerrar);
document.getElementById("confirmar").addEventListener("click", confirmar);
document.getElementById("capa").addEventListener("click", e => {
  if (e.target.id === "capa") cerrar();
});
cargar();
</script>
</body>
</html>
