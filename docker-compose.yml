# juliamoreno.yoga — web + herramientas de negocio
# Requiere: red externa "traefik_public" con Traefik (entrypoint websecure,
# certresolver letsencrypt) y fichero .env (ver .env.example).
#
# Perfiles:
#   web      -> solo el sitio estático            docker compose --profile web up -d
#   negocio  -> pg + umami (mínimo para medir)    docker compose --profile negocio up -d
#   todo     -> stack completo                    docker compose --profile todo up -d
# Un servicio puede pertenecer a varios perfiles; el orden de adopción
# recomendado está en docs/README-despliegue.md.

services:

  web:
    image: nginx:alpine
    container_name: jmy-web
    restart: unless-stopped
    profiles: [web, todo]
    volumes:
      - ./sitio:/usr/share/nginx/html:ro
      - ./nginx/sitio.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-web.rule=Host(`juliamoreno.yoga`) || Host(`www.juliamoreno.yoga`)
      - traefik.http.routers.jmy-web.entrypoints=websecure
      - traefik.http.routers.jmy-web.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-web.loadbalancer.server.port=80
      # Router adicional, con más prioridad, para proteger /admin con Authelia
      - traefik.http.routers.jmy-admin.rule=Host(`juliamoreno.yoga`) && PathPrefix(`/admin`)
      - traefik.http.routers.jmy-admin.entrypoints=websecure
      - traefik.http.routers.jmy-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.jmy-admin.priority=1000
      - traefik.http.routers.jmy-admin.middlewares=jmy-authelia
      - traefik.http.routers.jmy-admin.service=jmy-web
      # Middleware forwardAuth: valida contra Authelia (stack infra) antes de dejar pasar a /admin
      - traefik.http.middlewares.jmy-authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.juliamoreno.yoga
      - traefik.http.middlewares.jmy-authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.jmy-authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email
      # canónico: todo -> https://juliamoreno.yoga
      - traefik.http.middlewares.jmy-canon.redirectregex.regex=^https?://www\.juliamoreno\.yoga/(.*)
      - traefik.http.middlewares.jmy-canon.redirectregex.replacement=https://juliamoreno.yoga/$${1}
      - traefik.http.middlewares.jmy-canon.redirectregex.permanent=true
      - traefik.http.routers.jmy-web.middlewares=jmy-canon

  pg:
    image: postgres:16-alpine
    container_name: jmy-pg
    restart: unless-stopped
    profiles: [negocio, todo]
    environment:
      POSTGRES_USER: julia
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_DB: julia
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./stack/initdb:/docker-entrypoint-initdb.d:ro
    secrets: [pg_password]
    networks: [internal]

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: jmy-umami
    restart: unless-stopped
    profiles: [negocio, todo]
    environment:
      DATABASE_URL: postgresql://julia:${PG_PASSWORD}@pg:5432/umami
      APP_SECRET: ${UMAMI_SECRET}
    depends_on: [pg]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-umami.rule=Host(`stats.juliamoreno.yoga`)
      - traefik.http.routers.jmy-umami.entrypoints=websecure
      - traefik.http.routers.jmy-umami.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-umami.loadbalancer.server.port=3000

  calcom:
    image: calcom/cal.com:latest
    container_name: jmy-cal
    restart: unless-stopped
    profiles: [todo]
    environment:
      DATABASE_URL: postgresql://julia:${PG_PASSWORD}@pg:5432/calcom
      NEXTAUTH_SECRET: ${CALCOM_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENC_KEY}
      NEXT_PUBLIC_WEBAPP_URL: https://reservas.juliamoreno.yoga
    depends_on: [pg]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-cal.rule=Host(`reservas.juliamoreno.yoga`)
      - traefik.http.routers.jmy-cal.entrypoints=websecure
      - traefik.http.routers.jmy-cal.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-cal.loadbalancer.server.port=3000

  listmonk:
    image: listmonk/listmonk:latest
    container_name: jmy-listmonk
    restart: unless-stopped
    profiles: [todo]
    command: [sh, -c, "./listmonk --install --idempotent --yes && ./listmonk"]
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__host: pg
      LISTMONK_db__user: julia
      LISTMONK_db__password: ${PG_PASSWORD}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
    depends_on: [pg]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-lm.rule=Host(`correo.juliamoreno.yoga`)
      - traefik.http.routers.jmy-lm.entrypoints=websecure
      - traefik.http.routers.jmy-lm.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-lm.loadbalancer.server.port=9000

  nocodb:
    image: nocodb/nocodb:latest
    container_name: jmy-nocodb
    restart: unless-stopped
    profiles: [negocio, todo]
    environment:
      NC_DB: pg://pg:5432?u=julia&p=${PG_PASSWORD}&d=nocodb
      NC_PUBLIC_URL: https://datos.juliamoreno.yoga
      NC_DISABLE_TELE: "true"
      NC_INVITE_ONLY_SIGNUP: "true"
      NC_ALLOW_LOCAL_HOOKS: "true"
    volumes:
      - nocodata:/usr/app/data
    depends_on: [pg]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-nc.rule=Host(`datos.juliamoreno.yoga`)
      - traefik.http.routers.jmy-nc.entrypoints=websecure
      - traefik.http.routers.jmy-nc.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-nc.loadbalancer.server.port=8080

  # ---------- PERFIL gestion ----------

  invoiceninja-db:
    image: mariadb:11
    container_name: jmy-facturas-db
    restart: unless-stopped
    profiles: [gestion, todo]
    environment:
      MARIADB_ROOT_PASSWORD: ${IN_DB_PASSWORD}
      MARIADB_DATABASE: ninja
      MARIADB_USER: ninja
      MARIADB_PASSWORD: ${IN_DB_PASSWORD}
    volumes:
      - injadb:/var/lib/mysql
    networks: [internal]

  invoiceninja:
    # AVISO: antes de facturar en producción, confirmar con el gestor el
    # encaje Verifactu/antifraude 2026 del software de facturación.
    image: invoiceninja/invoiceninja-debian:latest
    container_name: jmy-facturas
    restart: unless-stopped
    profiles: [gestion, todo]
    environment:
      APP_KEY: ${IN_APP_KEY}          # base64:$(openssl rand -base64 32)
      APP_URL: https://facturas.juliamoreno.yoga
      DB_HOST: invoiceninja-db
      DB_DATABASE: ninja
      DB_USERNAME: ninja
      DB_PASSWORD: ${IN_DB_PASSWORD}
    volumes:
      - injadata:/var/www/html/storage
    depends_on: [invoiceninja-db]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-inv.rule=Host(`facturas.juliamoreno.yoga`)
      - traefik.http.routers.jmy-inv.entrypoints=websecure
      - traefik.http.routers.jmy-inv.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-inv.loadbalancer.server.port=8000

  redis:
    image: redis:7-alpine
    container_name: jmy-redis
    restart: unless-stopped
    profiles: [gestion, todo]
    volumes:
      - redisdata:/data
    networks: [internal]

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: jmy-postiz
    restart: unless-stopped
    profiles: [gestion, todo]
    environment:
      MAIN_URL: https://social.juliamoreno.yoga
      FRONTEND_URL: https://social.juliamoreno.yoga
      NEXT_PUBLIC_BACKEND_URL: https://social.juliamoreno.yoga/api
      BACKEND_INTERNAL_URL: http://localhost:3000
      JWT_SECRET: ${POSTIZ_JWT}
      DATABASE_URL: postgresql://julia:${PG_PASSWORD}@pg:5432/postiz
      REDIS_URL: redis://redis:6379
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "true"
    depends_on: [pg, redis]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-postiz.rule=Host(`social.juliamoreno.yoga`)
      - traefik.http.routers.jmy-postiz.entrypoints=websecure
      - traefik.http.routers.jmy-postiz.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-postiz.loadbalancer.server.port=5000

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: jmy-estado
    restart: unless-stopped
    profiles: [gestion, todo]
    volumes:
      - kumadata:/app/data
    networks: [traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-kuma.rule=Host(`estado.juliamoreno.yoga`)
      - traefik.http.routers.jmy-kuma.entrypoints=websecure
      - traefik.http.routers.jmy-kuma.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-kuma.loadbalancer.server.port=3001

  captador:
    image: python:3.12-alpine
    container_name: jmy-captador
    restart: unless-stopped
    profiles: [negocio, todo]
    working_dir: /app
    command: python3 scripts/captador.py
    environment:
      NOCODB_URL: http://nocodb:8080
      NOCODB_TOKEN: ${NOCODB_TOKEN}
      NOCODB_BASE: ${NOCODB_BASE:-Yoga}
      CAPTADOR_ORIGIN: https://juliamoreno.yoga
    volumes:
      - ./scripts:/app/scripts:ro
      - ./data:/app/data:ro
    depends_on: [nocodb]
    networks: [internal, traefik_public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jmy-cap.rule=Host(`api.juliamoreno.yoga`)
      - traefik.http.routers.jmy-cap.entrypoints=websecure
      - traefik.http.routers.jmy-cap.tls.certresolver=letsencrypt
      - traefik.http.services.jmy-cap.loadbalancer.server.port=8090
      # Rutas /admin/api/* protegidas por Authelia (router de mayor prioridad).
      # Authelia inyecta Remote-User; el captador confia en esa cabecera. Sin
      # esta proteccion, cualquiera podria falsificar Remote-User contra la API.
      - traefik.http.routers.jmy-capadmin.rule=Host(`api.juliamoreno.yoga`) && PathPrefix(`/admin`)
      - traefik.http.routers.jmy-capadmin.entrypoints=websecure
      - traefik.http.routers.jmy-capadmin.tls.certresolver=letsencrypt
      - traefik.http.routers.jmy-capadmin.priority=1000
      - traefik.http.routers.jmy-capadmin.service=jmy-cap
      - traefik.http.routers.jmy-capadmin.middlewares=jmy-authelia
      # Definicion del middleware (apunta al Authelia del stack infra)
      - traefik.http.middlewares.jmy-authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.juliamoreno.yoga
      - traefik.http.middlewares.jmy-authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.jmy-authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email

volumes:
  pgdata:
  nocodata:
  injadb:
  injadata:
  redisdata:
  kumadata:

secrets:
  pg_password:
    file: ./secrets/pg_password.txt

networks:
  internal:
  traefik_public:
    external: true
